name: Build Image
description: Build and push a Docker image to ghcr.io

inputs:
  context:
    required: true
  image:
    required: true
  tag-latest:
    default: "false"
  registry-token:
    required: true

runs:
  using: composite
  steps:
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.registry-token }}

    - uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.context }}
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/${{ inputs.image }}:${{ github.sha }}

    - if: inputs.tag-latest == 'true'
      shell: bash
      run: |
        IMAGE="ghcr.io/${{ github.repository_owner }}/${{ inputs.image }}"
        docker tag "${IMAGE}:${{ github.sha }}" "${IMAGE}:latest"
        docker push "${IMAGE}:latest"
